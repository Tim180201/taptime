name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Typecheck core, mobile, and Admin Web
        run: npm run typecheck

      - name: Test core, mobile, and Admin Web
        run: npm test

      - name: Build core
        run: npm run build --workspace=@taptime/core

      - name: Build Admin Web
        run: npm run build --workspace=@taptime/admin-web

      - name: Bundle Android product graph
        working-directory: apps/mobile
        run: npx expo export --platform android

  backend-b1-spike:
    name: Backend B1 PostgreSQL spike
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: taptime_b1
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d taptime_b1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      B1_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/taptime_b1
      B1_RUNTIME_DATABASE_URL: postgresql://taptime_b1_runtime:b1-ci-synthetic-only@127.0.0.1:5432/taptime_b1
      B1_RUNTIME_PASSWORD: b1-ci-synthetic-only

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Typecheck backend B1 spike
        run: npm run typecheck --workspace=@taptime/backend-b1-spike

      - name: Test backend B1 spike against direct PostgreSQL
        run: npm test --workspace=@taptime/backend-b1-spike

      - name: Build backend B1 spike
        run: npm run build --workspace=@taptime/backend-b1-spike

  backend-b3-schema:
    name: Backend B3 PostgreSQL schema security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: taptime_b3
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: taptime_b3_installer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taptime_b3_installer -d taptime_b3"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      B3_DATABASE_URL: postgresql://taptime_b3_installer:postgres@127.0.0.1:5432/taptime_b3
      B3_RUNTIME_PASSWORD: b3-ci-synthetic-only

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Typecheck backend B3 schema
        run: npm run typecheck --workspace=@taptime/backend-schema

      - name: Apply current schema migrations 001 through 009 to empty PostgreSQL database
        run: npm run migrate --workspace=@taptime/backend-schema

      - name: Re-run and verify migration ledger 001 through 009
        run: |
          npm run migrate --workspace=@taptime/backend-schema
          npm run verify-migrations --workspace=@taptime/backend-schema

      - name: Test B3 constraints and RLS negative matrix
        run: npm test --workspace=@taptime/backend-schema

      - name: Build backend B3 schema package
        run: npm run build --workspace=@taptime/backend-schema

  backend-b4-identity:
    name: Backend B4 identity and Membership security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: taptime_b4
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: taptime_b4_installer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taptime_b4_installer -d taptime_b4"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      B3_DATABASE_URL: postgresql://taptime_b4_installer:postgres@127.0.0.1:5432/taptime_b4
      B4_DATABASE_URL: postgresql://taptime_b4_installer:postgres@127.0.0.1:5432/taptime_b4
      B4_RUNTIME_PASSWORD: b4-ci-synthetic-only

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Apply current schema migrations 001 through 009 for B4
        run: npm run migrate --workspace=@taptime/backend-schema

      - name: Re-run and verify the B4 migration ledger
        run: |
          npm run migrate --workspace=@taptime/backend-schema
          npm run verify-migrations --workspace=@taptime/backend-schema

      - name: Typecheck backend B4 identity boundary including tests
        run: npm run typecheck --workspace=@taptime/backend-identity

      - name: Test backend B4 identity boundary against direct PostgreSQL
        run: npm test --workspace=@taptime/backend-identity

      - name: Build backend B4 identity package
        run: npm run build --workspace=@taptime/backend-identity

  backend-b5-read-model:
    name: Backend B5 tenant-safe read model
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: taptime_b5
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: taptime_b5_installer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taptime_b5_installer -d taptime_b5"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      B3_DATABASE_URL: postgresql://taptime_b5_installer:postgres@127.0.0.1:5432/taptime_b5
      B5_DATABASE_URL: postgresql://taptime_b5_installer:postgres@127.0.0.1:5432/taptime_b5
      B5_RUNTIME_PASSWORD: b5-ci-synthetic-only

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Build the approved B4 identity dependency
        run: npm run build --workspace=@taptime/backend-identity

      - name: Apply current schema migrations 001 through 009 for B5
        run: npm run migrate --workspace=@taptime/backend-schema

      - name: Re-run and verify the migration ledger
        run: |
          npm run migrate --workspace=@taptime/backend-schema
          npm run verify-migrations --workspace=@taptime/backend-schema

      - name: Typecheck backend B5 production and test sources
        run: npm run typecheck --workspace=@taptime/backend-read-model

      - name: Test backend B5 tenant-safe read model against direct PostgreSQL
        run: npm test --workspace=@taptime/backend-read-model

      - name: Build backend B5 read-model package
        run: npm run build --workspace=@taptime/backend-read-model

  backend-b6-lifecycle:
    name: Backend B6 server-canonical lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: taptime_b6
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: taptime_b6_installer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taptime_b6_installer -d taptime_b6"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      B3_DATABASE_URL: postgresql://taptime_b6_installer:postgres@127.0.0.1:5432/taptime_b6
      B6_DATABASE_URL: postgresql://taptime_b6_installer:postgres@127.0.0.1:5432/taptime_b6
      B6_RUNTIME_PASSWORD: b6-ci-synthetic-only

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Build approved Core, schema, and identity dependencies
        run: |
          npm run build --workspace=@taptime/core
          npm run build --workspace=@taptime/backend-schema
          npm run build --workspace=@taptime/backend-identity

      - name: Apply schema migrations 001 through 009
        run: npm run migrate --workspace=@taptime/backend-schema

      - name: Re-run and verify migration ledger 001 through 009
        run: |
          npm run migrate --workspace=@taptime/backend-schema
          npm run verify-migrations --workspace=@taptime/backend-schema

      - name: Typecheck B6 production and test sources
        run: npm run typecheck --workspace=@taptime/backend-lifecycle

      - name: Test B6 against direct PostgreSQL 17
        run: npm test --workspace=@taptime/backend-lifecycle

      - name: Build backend B6 lifecycle package
        run: npm run build --workspace=@taptime/backend-lifecycle

  backend-c2-api:
    name: Backend C2/C3C/C3E1 authenticated API and Mobile transport
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: taptime_c2
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: taptime_c2_installer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taptime_c2_installer -d taptime_c2"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      B3_DATABASE_URL: postgresql://taptime_c2_installer:postgres@127.0.0.1:5432/taptime_c2
      C2_DATABASE_URL: postgresql://taptime_c2_installer:postgres@127.0.0.1:5432/taptime_c2
      C2_SESSION_DATABASE_URL: postgresql://taptime_c2_session_runtime:c2-session-ci-synthetic-only@127.0.0.1:5432/taptime_c2
      C2_READ_MODEL_DATABASE_URL: postgresql://taptime_c2_read_model_runtime:c2-read-ci-synthetic-only@127.0.0.1:5432/taptime_c2
      C2_LIFECYCLE_DATABASE_URL: postgresql://taptime_c2_lifecycle_runtime:c2-lifecycle-ci-synthetic-only@127.0.0.1:5432/taptime_c2
      C2_ADMINISTRATION_DATABASE_URL: postgresql://taptime_c2_administration_runtime:c2-administration-ci-synthetic-only@127.0.0.1:5432/taptime_c2
      C2_SESSION_RUNTIME_PASSWORD: c2-session-ci-synthetic-only
      C2_READ_MODEL_RUNTIME_PASSWORD: c2-read-ci-synthetic-only
      C2_LIFECYCLE_RUNTIME_PASSWORD: c2-lifecycle-ci-synthetic-only
      C2_ADMINISTRATION_RUNTIME_PASSWORD: c2-administration-ci-synthetic-only

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Build required contract, Core, schema, B4, B5, B6, C3C, and C3E1 dependencies
        run: |
          npm run build --workspace=@taptime/administration-contract
          npm run build --workspace=@taptime/core
          npm run build --workspace=@taptime/backend-schema
          npm run build --workspace=@taptime/backend-identity
          npm run build --workspace=@taptime/backend-read-model
          npm run build --workspace=@taptime/backend-lifecycle
          npm run build --workspace=@taptime/backend-administration

      - name: Apply schema migrations 001 through 009 to clean PostgreSQL 17
        run: npm run migrate --workspace=@taptime/backend-schema

      - name: Re-run and verify migration ledger 001 through 009
        run: |
          npm run migrate --workspace=@taptime/backend-schema
          npm run verify-migrations --workspace=@taptime/backend-schema

      - name: Typecheck C2/C3C/C3E1 API production and test sources
        run: npm run typecheck --workspace=@taptime/backend-api

      - name: Test C1, C2, C3C, and C3E1 API against direct PostgreSQL and local JWKS
        run: npm test --workspace=@taptime/backend-api

      - name: Build C2/C3C/C3E1 backend API
        run: npm run build --workspace=@taptime/backend-api

      - name: Typecheck and test Mobile authentication, C2 transports, and C3E1 enrollment
        run: |
          npm run typecheck --workspace=@taptime/mobile
          npm test --workspace=@taptime/mobile

  backend-c3b-bootstrap:
    name: Backend C3B secure Organization bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: taptime_c3b
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: taptime_c3b_installer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taptime_c3b_installer -d taptime_c3b"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      B3_DATABASE_URL: postgresql://taptime_c3b_installer:postgres@127.0.0.1:5432/taptime_c3b
      C3B_DATABASE_URL: postgresql://taptime_c3b_installer:postgres@127.0.0.1:5432/taptime_c3b

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Build C3B type dependencies
        run: |
          npm run build --workspace=@taptime/administration-contract
          npm run build --workspace=@taptime/core
          npm run build --workspace=@taptime/backend-schema
          npm run build --workspace=@taptime/backend-identity

      - name: Apply schema migrations 001 through 009 to clean PostgreSQL 17
        run: npm run migrate --workspace=@taptime/backend-schema

      - name: Re-run and verify migration ledger 001 through 009
        run: |
          npm run migrate --workspace=@taptime/backend-schema
          npm run verify-migrations --workspace=@taptime/backend-schema

      - name: Typecheck C3B production and test sources
        run: npm run typecheck --workspace=@taptime/backend-bootstrap

      - name: Test C3B with real B4 verifier and direct PostgreSQL 17
        run: npm test --workspace=@taptime/backend-bootstrap

      - name: Build isolated C3B operator CLI
        run: npm run build --workspace=@taptime/backend-bootstrap

      - name: Execute and verify isolated C3B operator CLI binary
        run: npm run verify-bin --workspace=@taptime/backend-bootstrap

  backend-c3c-administration:
    name: Backend C3C/C3E1 administration and enrollment security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: taptime_c3c
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: taptime_c3c_installer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taptime_c3c_installer -d taptime_c3c"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      B3_DATABASE_URL: postgresql://taptime_c3c_installer:postgres@127.0.0.1:5432/taptime_c3c
      C3C_DATABASE_URL: postgresql://taptime_c3c_installer:postgres@127.0.0.1:5432/taptime_c3c

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Build C3C/C3E1/C3E2 contract, Core, schema, identity, and B6 dependencies
        run: |
          npm run build --workspace=@taptime/administration-contract
          npm run build --workspace=@taptime/core
          npm run build --workspace=@taptime/backend-schema
          npm run build --workspace=@taptime/backend-identity
          npm run build --workspace=@taptime/backend-lifecycle

      - name: Apply schema migrations 001 through 009 to clean PostgreSQL 17
        run: npm run migrate --workspace=@taptime/backend-schema

      - name: Re-run and verify migration ledger 001 through 009
        run: |
          npm run migrate --workspace=@taptime/backend-schema
          npm run verify-migrations --workspace=@taptime/backend-schema

      - name: Typecheck and test neutral C3 contract
        run: |
          npm run typecheck --workspace=@taptime/administration-contract
          npm test --workspace=@taptime/administration-contract

      - name: Typecheck and test C3C/C3E1/C3E2 against direct PostgreSQL 17
        run: |
          npm run typecheck --workspace=@taptime/backend-administration
          npm test --workspace=@taptime/backend-administration

      - name: Build isolated C3C/C3E1/C3E2 administration package
        run: npm run build --workspace=@taptime/backend-administration

  synthetic-android-e2e:
    name: Synthetic server-connected Android E2E harness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TAPTIME_SYNTHETIC_E2E_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/taptime_synthetic_android_e2e

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Start loopback-only PostgreSQL 17
        run: |
          docker run --detach --rm \
            --name taptime-synthetic-android-e2e-postgres \
            --network host \
            --env POSTGRES_DB=taptime_synthetic_android_e2e \
            --env POSTGRES_PASSWORD=postgres \
            --env POSTGRES_USER=postgres \
            postgres:17.10-alpine \
            -c listen_addresses=127.0.0.1
          for attempt in {1..30}; do
            if docker exec taptime-synthetic-android-e2e-postgres \
              pg_isready -U postgres -d taptime_synthetic_android_e2e; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Build synthetic harness type dependencies
        run: |
          npm run build --workspace=@taptime/administration-contract
          npm run build --workspace=@taptime/core
          npm run build --workspace=@taptime/backend-schema
          npm run build --workspace=@taptime/backend-identity
          npm run build --workspace=@taptime/backend-read-model
          npm run build --workspace=@taptime/backend-lifecycle
          npm run build --workspace=@taptime/backend-administration
          npm run build --workspace=@taptime/backend-api

      - name: Typecheck synthetic Android E2E harness
        run: npm run typecheck --workspace=@taptime/synthetic-android-e2e

      - name: Test synthetic Android E2E harness against clean PostgreSQL 17
        run: npm test --workspace=@taptime/synthetic-android-e2e

      - name: Build synthetic Android E2E harness
        run: npm run build --workspace=@taptime/synthetic-android-e2e

      - name: Stop synthetic PostgreSQL
        if: always()
        run: docker rm --force taptime-synthetic-android-e2e-postgres || true
