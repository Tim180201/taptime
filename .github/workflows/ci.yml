name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Typecheck core and mobile
        run: npm run typecheck

      - name: Test core and mobile
        run: npm test

      - name: Build core
        run: npm run build --workspace=@taptime/core

  backend-b1-spike:
    name: Backend B1 PostgreSQL spike
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: taptime_b1
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d taptime_b1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      B1_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/taptime_b1
      B1_RUNTIME_DATABASE_URL: postgresql://taptime_b1_runtime:b1-ci-synthetic-only@127.0.0.1:5432/taptime_b1
      B1_RUNTIME_PASSWORD: b1-ci-synthetic-only

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Typecheck backend B1 spike
        run: npm run typecheck --workspace=@taptime/backend-b1-spike

      - name: Test backend B1 spike against direct PostgreSQL
        run: npm test --workspace=@taptime/backend-b1-spike

      - name: Build backend B1 spike
        run: npm run build --workspace=@taptime/backend-b1-spike

  backend-b3-schema:
    name: Backend B3 PostgreSQL schema security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: taptime_b3
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: taptime_b3_installer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taptime_b3_installer -d taptime_b3"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      B3_DATABASE_URL: postgresql://taptime_b3_installer:postgres@127.0.0.1:5432/taptime_b3
      B3_RUNTIME_PASSWORD: b3-ci-synthetic-only

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Typecheck backend B3 schema
        run: npm run typecheck --workspace=@taptime/backend-schema

      - name: Apply current schema migrations 001 through 005 to empty PostgreSQL database
        run: npm run migrate --workspace=@taptime/backend-schema

      - name: Re-run and verify migration ledger 001 through 005
        run: |
          npm run migrate --workspace=@taptime/backend-schema
          npm run verify-migrations --workspace=@taptime/backend-schema

      - name: Test B3 constraints and RLS negative matrix
        run: npm test --workspace=@taptime/backend-schema

      - name: Build backend B3 schema package
        run: npm run build --workspace=@taptime/backend-schema

  backend-b4-identity:
    name: Backend B4 identity and Membership security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: taptime_b4
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: taptime_b4_installer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taptime_b4_installer -d taptime_b4"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      B3_DATABASE_URL: postgresql://taptime_b4_installer:postgres@127.0.0.1:5432/taptime_b4
      B4_DATABASE_URL: postgresql://taptime_b4_installer:postgres@127.0.0.1:5432/taptime_b4
      B4_RUNTIME_PASSWORD: b4-ci-synthetic-only

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Apply current schema migrations 001 through 005 for B4
        run: npm run migrate --workspace=@taptime/backend-schema

      - name: Re-run and verify the B4 migration ledger
        run: |
          npm run migrate --workspace=@taptime/backend-schema
          npm run verify-migrations --workspace=@taptime/backend-schema

      - name: Typecheck backend B4 identity boundary including tests
        run: npm run typecheck --workspace=@taptime/backend-identity

      - name: Test backend B4 identity boundary against direct PostgreSQL
        run: npm test --workspace=@taptime/backend-identity

      - name: Build backend B4 identity package
        run: npm run build --workspace=@taptime/backend-identity

  backend-b5-read-model:
    name: Backend B5 tenant-safe read model
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: taptime_b5
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: taptime_b5_installer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taptime_b5_installer -d taptime_b5"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      B3_DATABASE_URL: postgresql://taptime_b5_installer:postgres@127.0.0.1:5432/taptime_b5
      B5_DATABASE_URL: postgresql://taptime_b5_installer:postgres@127.0.0.1:5432/taptime_b5
      B5_RUNTIME_PASSWORD: b5-ci-synthetic-only

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Build the approved B4 identity dependency
        run: npm run build --workspace=@taptime/backend-identity

      - name: Apply current schema migrations 001 through 005 for B5
        run: npm run migrate --workspace=@taptime/backend-schema

      - name: Re-run and verify the migration ledger
        run: |
          npm run migrate --workspace=@taptime/backend-schema
          npm run verify-migrations --workspace=@taptime/backend-schema

      - name: Typecheck backend B5 production and test sources
        run: npm run typecheck --workspace=@taptime/backend-read-model

      - name: Test backend B5 tenant-safe read model against direct PostgreSQL
        run: npm test --workspace=@taptime/backend-read-model

      - name: Build backend B5 read-model package
        run: npm run build --workspace=@taptime/backend-read-model

  backend-b6-lifecycle:
    name: Backend B6 server-canonical lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: taptime_b6
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: taptime_b6_installer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taptime_b6_installer -d taptime_b6"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      B3_DATABASE_URL: postgresql://taptime_b6_installer:postgres@127.0.0.1:5432/taptime_b6
      B6_DATABASE_URL: postgresql://taptime_b6_installer:postgres@127.0.0.1:5432/taptime_b6
      B6_RUNTIME_PASSWORD: b6-ci-synthetic-only

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Build approved Core, schema, and identity dependencies
        run: |
          npm run build --workspace=@taptime/core
          npm run build --workspace=@taptime/backend-schema
          npm run build --workspace=@taptime/backend-identity

      - name: Apply schema migrations 001 through 005
        run: npm run migrate --workspace=@taptime/backend-schema

      - name: Re-run and verify migration ledger 001 through 005
        run: |
          npm run migrate --workspace=@taptime/backend-schema
          npm run verify-migrations --workspace=@taptime/backend-schema

      - name: Typecheck B6 production and test sources
        run: npm run typecheck --workspace=@taptime/backend-lifecycle

      - name: Test B6 against direct PostgreSQL 17
        run: npm test --workspace=@taptime/backend-lifecycle

      - name: Build backend B6 lifecycle package
        run: npm run build --workspace=@taptime/backend-lifecycle

  backend-c1-session:
    name: Backend C1 session and Mobile auth
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: taptime_c1
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: taptime_c1_installer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taptime_c1_installer -d taptime_c1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      B3_DATABASE_URL: postgresql://taptime_c1_installer:postgres@127.0.0.1:5432/taptime_c1
      C1_DATABASE_URL: postgresql://taptime_c1_installer:postgres@127.0.0.1:5432/taptime_c1
      C1_RUNTIME_DATABASE_URL: postgresql://taptime_c1_session_runtime:c1-ci-synthetic-only@127.0.0.1:5432/taptime_c1
      C1_RUNTIME_PASSWORD: c1-ci-synthetic-only

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Build required Core, schema, and B4 identity dependencies
        run: |
          npm run build --workspace=@taptime/core
          npm run build --workspace=@taptime/backend-schema
          npm run build --workspace=@taptime/backend-identity

      - name: Apply schema migrations 001 through 005 to clean PostgreSQL 17
        run: npm run migrate --workspace=@taptime/backend-schema

      - name: Re-run and verify migration ledger 001 through 005
        run: |
          npm run migrate --workspace=@taptime/backend-schema
          npm run verify-migrations --workspace=@taptime/backend-schema

      - name: Typecheck C1 production and test sources
        run: npm run typecheck --workspace=@taptime/backend-session-api

      - name: Test C1 session API against direct PostgreSQL and local JWKS
        run: npm test --workspace=@taptime/backend-session-api

      - name: Build C1 session API
        run: npm run build --workspace=@taptime/backend-session-api

      - name: Typecheck and test Mobile C1 authentication
        run: |
          npm run typecheck --workspace=@taptime/mobile
          npm test --workspace=@taptime/mobile
